# ===================================================
# PROFIL LOCAL - Développement sans Docker
# ===================================================

# ===================================================
# APPLICATION SECURICOMPTE
# ===================================================
spring.application.name=securicompte
server.port=8080

# ===================================================
# DATASOURCE POSTGRESQL - Configuration locale
# ===================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/securicompte_db
spring.datasource.username=securicompte_user
spring.datasource.password=securicompte_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# ===================================================
# JPA / HIBERNATE
# ===================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===================================================
# FLYWAY
# ===================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===================================================
# THYMELEAF
# ===================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===================================================
# UPLOAD
# ===================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===================================================
# JWT
# ===================================================
app.jwt.secret=S3cur1c0mpt3JWTSecretKeyForProductionUse2024VeryLongAndSecure
app.jwt.expiration=86400000

# ===================================================
# LOGGING
# ===================================================
logging.level.com.securicompte=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
