# ===================================================
# APPLICATION SECURICOMPTE
# ===================================================
spring.application.name=gestion-impayes
server.port=8080

# ===================================================
# DATASOURCE POSTGRESQL
# ===================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/securicompte_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# ===================================================
# JPA / HIBERNATE
# ===================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===================================================
# FLYWAY
# ===================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=false

# ===================================================
# THYMELEAF
# ===================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===================================================
# UPLOAD
# ===================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ===================================================
# JWT (non utilisé en mode intranet — conservé pour future API REST)
# OBLIGATOIRE : définir la variable d'environnement JWT_SECRET avant déploiement
# Exemple Linux/Mac : export JWT_SECRET=<votre_secret_long_et_aleatoire>
# Exemple Windows   : set JWT_SECRET=<votre_secret_long_et_aleatoire>
# ===================================================
app.jwt.secret=${JWT_SECRET:REMPLACER_PAR_VARIABLE_ENVIRONNEMENT_JWT_SECRET}
app.jwt.expiration=86400000

# ===================================================
# ALERTES
# ===================================================
# Seuil en mois au-delà duquel un impayé est considéré "ancien"
app.alertes.seuil-impayes-mois=3

# ===================================================
# LOGGING
# ===================================================
logging.level.com.securicompte=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
