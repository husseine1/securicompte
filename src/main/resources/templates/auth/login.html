<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securicompte - Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5f8f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #1a3a5c, #2a5f8f);
            padding: 36px 32px;
            text-align: center;
        }
        .login-header .shield-icon {
            width: 72px; height: 72px;
            background: rgba(255,255,255,.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: #e8b800;
        }
        .login-header h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
        }
        .login-header p {
            color: rgba(255,255,255,.65);
            font-size: 13px;
            margin: 6px 0 0;
        }
        .login-body { padding: 32px; }
        .form-control {
            border-radius: 8px;
            padding: 12px 14px;
            border: 1.5px solid #dee2e6;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #1a3a5c;
            box-shadow: 0 0 0 3px rgba(26,58,92,.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a3a5c, #2a5f8f);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: .9; color: #fff; }
        .input-group-text {
            background: #f8f9fa;
            border: 1.5px solid #dee2e6;
            border-right: none;
            color: #6c757d;
        }
        .input-group .form-control { border-left: none; }
        .login-footer {
            background: #f8f9fa;
            padding: 16px 32px;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="shield-icon"><i class="fas fa-shield-alt"></i></div>
        <h1>SECURICOMPTE</h1>
        <p>Système de gestion des impayés</p>
    </div>

    <div class="login-body">
        <div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" class="alert alert-success py-2 mb-3">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${warningMessage}" class="alert alert-warning py-2 mb-3">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${warningMessage}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary" style="font-size:13px">IDENTIFIANT</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username"
                           placeholder="Votre identifiant" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary" style="font-size:13px">MOT DE PASSE</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password"
                           placeholder="Votre mot de passe" required id="passwordInput">
                    <button type="button" class="btn btn-outline-secondary" id="togglePwd"
                            style="border-left:none">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>SE CONNECTER
            </button>
        </form>
    </div>

    <div class="login-footer">
        <i class="fas fa-lock me-1"></i>
        Connexion sécurisée &mdash; Securicompte v1.0
    </div>
</div>

<script>
    document.getElementById('togglePwd').addEventListener('click', function() {
        const input = document.getElementById('passwordInput');
        const icon  = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    });
</script>
</body>
</html>
