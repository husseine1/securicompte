<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Clients - Securicompte</title></head>
<body>
<section>
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-2">
            <form th:action="@{/client}" method="get" class="d-flex gap-2">
                <input type="text" class="form-control" name="q" placeholder="Rechercher par nom..."
                       th:value="${searchQuery}" style="max-width:400px">
                <button type="submit" class="btn btn-primary"><i class="fas fa-search me-1"></i>Rechercher</button>
                <a th:href="@{/client/recherche}" class="btn btn-outline-secondary">
                    <i class="fas fa-sliders-h me-1"></i>Recherche avancée
                </a>
            </form>
        </div>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3">
            <h6 class="mb-0 fw-bold"><i class="fas fa-users me-2 text-primary"></i>
                Clients <span class="badge bg-secondary ms-1" th:text="${clients.totalElements}"></span>
            </h6>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>N° Client</th><th>Nom</th><th>Agence</th><th>Gestionnaire</th><th>Zone</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${clients}">
                        <td class="fw-semibold" th:text="${c.numeroClient}"></td>
                        <td th:text="${c.nom}"></td>
                        <td><small class="text-muted" th:text="${c.agenceLib ?: '-'}"></small></td>
                        <td><small class="text-muted" th:text="${c.gestionnaire ?: '-'}"></small></td>
                        <td><small class="text-muted" th:text="${c.zoneLib ?: '-'}"></small></td>
                        <td>
                            <a th:href="@{/client/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary py-0 px-2">
                                <i class="fas fa-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${clients.empty}">
                        <td colspan="6" class="text-center text-muted py-4">Aucun client trouvé</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
