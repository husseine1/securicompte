<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Import fichiers - Gestion des Impayés</title></head>
<body>
<section>

  <div class="row g-4">

    <!-- Formulaire d'import -->
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 pt-3">
          <h6 class="mb-0 fw-bold"><i class="fas fa-file-upload me-2 text-primary"></i>Importer un fichier Excel</h6>
        </div>
        <div class="card-body">
          <form id="importForm" th:action="@{/import/upload}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:12px">FICHIER EXCEL</label>
              <input type="file" class="form-control" id="fichierInput" name="fichier"
                     accept=".xlsx,.xls,.xlsb" required>
              <div class="form-text">Formats acceptés : .xlsx, .xls, .xlsb</div>
            </div>

            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" style="font-size:12px">ANNÉE</label>
                <input type="number" class="form-control" name="annee"
                       th:value="${anneeCourante}" min="2000" max="2099" required>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" style="font-size:12px">MOIS</label>
                <select class="form-select" name="mois" required>
                  <option value="1"  th:selected="${moisCourant == 1}">Janvier</option>
                  <option value="2"  th:selected="${moisCourant == 2}">Février</option>
                  <option value="3"  th:selected="${moisCourant == 3}">Mars</option>
                  <option value="4"  th:selected="${moisCourant == 4}">Avril</option>
                  <option value="5"  th:selected="${moisCourant == 5}">Mai</option>
                  <option value="6"  th:selected="${moisCourant == 6}">Juin</option>
                  <option value="7"  th:selected="${moisCourant == 7}">Juillet</option>
                  <option value="8"  th:selected="${moisCourant == 8}">Août</option>
                  <option value="9"  th:selected="${moisCourant == 9}">Septembre</option>
                  <option value="10" th:selected="${moisCourant == 10}">Octobre</option>
                  <option value="11" th:selected="${moisCourant == 11}">Novembre</option>
                  <option value="12" th:selected="${moisCourant == 12}">Décembre</option>
                </select>
              </div>
            </div>

            <button id="submitBtn" type="submit" class="btn btn-primary w-100">
              <span id="btnText"><i class="fas fa-upload me-1"></i>Lancer l'import</span>
              <span id="btnSpinner" class="d-none">
                <span class="spinner-border spinner-border-sm me-1" role="status"></span>Traitement en cours&#8230;
              </span>
            </button>
          </form>
        </div>
      </div>

      <!-- Résultat du dernier import -->
      <div th:if="${dernierImport}" class="card border-0 shadow-sm mt-3">
        <div class="card-header bg-white border-0 pt-3">
          <h6 class="mb-0 fw-bold"><i class="fas fa-info-circle me-2 text-info"></i>Résultat</h6>
        </div>
        <div class="card-body">
          <ul class="list-unstyled mb-0" style="font-size:13px">
            <li><i class="fas fa-database me-2 text-secondary"></i>Stock : <strong th:text="${dernierImport.nbStock}"></strong></li>
            <li><i class="fas fa-user-plus me-2 text-success"></i>Nouvelles : <strong th:text="${dernierImport.nbNouvelles}"></strong></li>
            <li><i class="fas fa-exclamation-triangle me-2 text-danger"></i>Impayés : <strong th:text="${dernierImport.nbImpaYesDetectes}"></strong></li>
            <li th:if="${dernierImport.nbErreurs > 0}">
              <i class="fas fa-times-circle me-2 text-warning"></i>Erreurs lignes : <strong class="text-warning" th:text="${dernierImport.nbErreurs}"></strong>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Historique des imports -->
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 pt-3">
          <h6 class="mb-0 fw-bold">
            <i class="fas fa-history me-2 text-secondary"></i>Historique des imports
            <span class="badge bg-secondary ms-1" th:text="${imports.size()}"></span>
          </h6>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Période</th>
                <th>Fichier</th>
                <th>Stock</th>
                <th>Nouvelles</th>
                <th>Erreurs</th>
                <th>Statut</th>
                <th>Date import</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="imp : ${imports}">
                <td>
                  <span class="badge bg-primary"
                        th:text="${imp.mois + '/' + imp.annee}"></span>
                </td>
                <td class="text-truncate" style="max-width:180px" th:text="${imp.nomFichier}"></td>
                <td th:text="${imp.nbStock}"></td>
                <td th:text="${imp.nbNouvelles}"></td>
                <td>
                  <span th:if="${imp.nbErreurs > 0}" class="badge bg-warning text-dark" th:text="${imp.nbErreurs}"></span>
                  <span th:if="${imp.nbErreurs == 0}" class="text-muted">-</span>
                </td>
                <td>
                  <span class="badge"
                        th:classappend="${imp.statut.name() == 'SUCCES'}   ? 'bg-success' :
                                        (${imp.statut.name() == 'ECHEC'}   ? 'bg-danger'  :
                                        (${imp.statut.name() == 'PARTIEL'} ? 'bg-warning' : 'bg-secondary'))"
                        th:text="${imp.statut}"></span>
                </td>
                <td style="font-size:12px"
                    th:text="${imp.dateImport != null ? #temporals.format(imp.dateImport,'dd/MM/yyyy HH:mm') : '-'}"></td>
                <td>
                  <div class="d-flex gap-1">
                    <a th:href="@{/import/{id}(id=${imp.id})}"
                       class="btn btn-sm btn-outline-primary py-0 px-2" title="Voir le détail">
                      <i class="fas fa-eye"></i>
                    </a>
                    <form th:action="@{/import/{id}/supprimer(id=${imp.id})}" method="post" class="d-inline"
                          sec:authorize="hasRole('ROLE_ADMIN')"
                          onsubmit="return confirm('Supprimer cet import et toutes ses données ?')">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                      <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2" title="Supprimer">
                        <i class="fas fa-trash"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${imports.empty}">
                <td colspan="8" class="text-center text-muted py-4">
                  <i class="fas fa-inbox fa-2x mb-2 d-block"></i>Aucun import &#8212; utilisez le formulaire ci-contre
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    document.getElementById('importForm').addEventListener('submit', function() {
      document.getElementById('btnText').classList.add('d-none');
      document.getElementById('btnSpinner').classList.remove('d-none');
      document.getElementById('submitBtn').disabled = true;
    });
  </script>

</section>
</body>
</html>
