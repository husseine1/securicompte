<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Historique des notifications - Gestion des Impayés</title></head>
<body>
<section>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h5 class="fw-bold mb-0"><i class="fas fa-bell me-2 text-warning"></i>Historique des notifications</h5>
      <small class="text-muted" th:text="${notifications.totalElements + ' notification(s) au total'}"></small>
    </div>
    <form th:action="@{/notifications/tout-lire}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-check-double me-1"></i>Tout marquer comme lu
      </button>
    </form>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-sm mb-0" style="font-size:13px">
          <thead class="table-light">
            <tr>
              <th style="width:130px">Date</th>
              <th style="width:160px">Type</th>
              <th style="width:80px">Période</th>
              <th style="width:160px">Client</th>
              <th style="width:130px">Securicompte</th>
              <th style="width:130px">Commissions</th>
              <th>Message</th>
              <th style="width:60px">Statut</th>
              <th style="width:90px">Lu par</th>
              <th style="width:50px"></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="n : ${notifications}"
                th:classappend="${!n.lu} ? 'table-warning' : ''">

              <!-- Date -->
              <td class="text-nowrap">
                <span th:text="${n.createdAt != null ? #temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm') : '—'}"></span>
              </td>

              <!-- Type -->
              <td>
                <span th:if="${n.type == 'CHANGEMENT_PRIME'}"
                      class="badge bg-warning text-dark">
                  <i class="fas fa-exchange-alt me-1"></i>Changement prime
                </span>
                <span th:if="${n.type == 'CHANGEMENT_PRIME_IMPORT'}">
                  <span class="badge bg-info text-dark">
                    <i class="fas fa-file-import me-1"></i>Changement prime import
                  </span>
                  <a th:if="${n.anneeImpaye != null and n.moisImpaye != null}"
                     th:href="@{/import/{annee}/{mois}/changements-prime(annee=${n.anneeImpaye},mois=${n.moisImpaye})}"
                     class="btn btn-sm btn-outline-info py-0 px-1 ms-1" title="Voir le détail des clients">
                    <i class="fas fa-list"></i>
                  </a>
                </span>
                <span th:if="${n.type == 'IMPAYE_ANCIEN'}"
                      class="badge bg-danger">
                  <i class="fas fa-exclamation-circle me-1"></i>Impayé ancien
                </span>
                <span th:if="${n.type != 'CHANGEMENT_PRIME' and n.type != 'CHANGEMENT_PRIME_IMPORT' and n.type != 'IMPAYE_ANCIEN'}"
                      class="badge bg-secondary" th:text="${n.type}"></span>
              </td>

              <!-- Période -->
              <td class="text-nowrap">
                <span th:if="${n.moisImpaye != null and n.anneeImpaye != null}"
                      class="badge bg-primary"
                      th:text="${n.moisImpaye + '/' + n.anneeImpaye}"></span>
                <span th:if="${n.moisImpaye == null or n.anneeImpaye == null}"
                      class="text-muted">—</span>
              </td>

              <!-- Client -->
              <td>
                <span th:if="${n.clientNom != null}">
                  <a th:if="${n.clientId != null}"
                     th:href="@{/clients/{id}(id=${n.clientId})}"
                     class="text-decoration-none fw-semibold"
                     th:text="${n.clientNom}"></a>
                  <span th:if="${n.clientId == null}" th:text="${n.clientNom}"></span>
                </span>
                <span th:if="${n.clientNom == null}" class="text-muted">—</span>
              </td>

              <!-- Securicompte avant → après -->
              <td class="text-nowrap">
                <span th:if="${n.securicompteAvant != null or n.securicompteApres != null}">
                  <span class="text-danger" th:text="${n.securicompteAvant != null ? n.securicompteAvant : '—'}"></span>
                  <i class="fas fa-arrow-right text-muted mx-1" style="font-size:10px"></i>
                  <span class="text-success" th:text="${n.securicompteApres != null ? n.securicompteApres : '—'}"></span>
                </span>
                <span th:if="${n.securicompteAvant == null and n.securicompteApres == null}"
                      class="text-muted">—</span>
              </td>

              <!-- Commissions avant → après -->
              <td class="text-nowrap">
                <span th:if="${n.commissionsAvant != null or n.commissionsApres != null}">
                  <span class="text-danger" th:text="${n.commissionsAvant != null ? n.commissionsAvant : '—'}"></span>
                  <i class="fas fa-arrow-right text-muted mx-1" style="font-size:10px"></i>
                  <span class="text-success" th:text="${n.commissionsApres != null ? n.commissionsApres : '—'}"></span>
                </span>
                <span th:if="${n.commissionsAvant == null and n.commissionsApres == null}"
                      class="text-muted">—</span>
              </td>

              <!-- Message -->
              <td>
                <span th:title="${n.message}"
                      th:text="${#strings.length(n.message) > 80 ? #strings.substring(n.message, 0, 80) + '…' : n.message}">
                </span>
              </td>

              <!-- Statut -->
              <td class="text-center">
                <span th:if="${n.lu}"  class="badge bg-success"><i class="fas fa-check"></i></span>
                <span th:if="${!n.lu}" class="badge bg-warning text-dark"><i class="fas fa-circle"></i></span>
              </td>

              <!-- Lu par -->
              <td style="font-size:11px">
                <span th:if="${n.luPar != null}">
                  <div th:text="${n.luPar}"></div>
                  <div class="text-muted"
                       th:if="${n.dateLu != null}"
                       th:text="${#temporals.format(n.dateLu, 'dd/MM HH:mm')}"></div>
                </span>
                <span th:if="${n.luPar == null}" class="text-muted">—</span>
              </td>

              <!-- Action marquer lu -->
              <td>
                <form th:if="${!n.lu}"
                      th:action="@{/notifications/{id}/lire-redirect(id=${n.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <input type="hidden" name="page" th:value="${page}">
                  <button type="submit" class="btn btn-sm btn-outline-success py-0 px-1" title="Marquer comme lu">
                    <i class="fas fa-check"></i>
                  </button>
                </form>
              </td>

            </tr>
            <tr th:if="${notifications.empty}">
              <td colspan="10" class="text-center text-muted py-5">
                <i class="fas fa-bell-slash fa-3x mb-2 d-block"></i>
                Aucune notification enregistrée.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center"
         th:if="${notifications.totalPages > 1}">
      <small class="text-muted">
        Page <span th:text="${notifications.number + 1}"></span> /
        <span th:text="${notifications.totalPages}"></span>
        — <span th:text="${notifications.totalElements}"></span> notifications
      </small>
      <nav>
        <ul class="pagination pagination-sm mb-0">
          <li class="page-item" th:classappend="${notifications.first} ? 'disabled'">
            <a class="page-link" th:href="@{/notifications/historique(page=${notifications.number - 1})}">&laquo; Préc.</a>
          </li>
          <li class="page-item" th:classappend="${notifications.last} ? 'disabled'">
            <a class="page-link" th:href="@{/notifications/historique(page=${notifications.number + 1})}">Suiv. &raquo;</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>

</section>
</body>
</html>
